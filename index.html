<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Football Quiz</title>
  <style>
    body { font-family: Arial; max-width: 600px; margin: auto; padding: 20px; }
    input { width: 100%; padding: 8px; }
    ul { list-style: none; padding: 0; border: 1px solid #ccc; }
    li { padding: 5px; cursor: pointer; }
    li:hover { background: #eee; }
    button { margin-top: 10px; padding: 10px; }
  </style>
</head>
<body>

<h2>⚽ Who scored here?</h2>

<h5>todo: Höndla sjálfsmörk, Laga Þ og TH</h5>

<p><b>Team:</b> <span id="team"></span></p>
<p><b>Stadium:</b> <span id="stadium"></span></p>

<div>
  <p>Number of possible scorers: <span id="numAnswers">0</span></p>


<input type="text" id="playerInput" placeholder="Type player name...">
<ul id="suggestions"></ul>

<select id="seasonSelect"></select>

<br>
<button onclick="submitAnswer()">Submit</button>
<button onclick="newQuestion()">New Question</button>

<p id="result"></p>

  <p><b>Correct players:</b> <br> <span id="correctAnswers"></span></p>
</div>

<script>
let data = [];
let questions = [];
let seasons = [];
let players = [];
let index = {};
let currentQuestion = null;

// Load JSON

  fetch("output.json")
  .then(res => res.json())
  .then(json => {
    // Filter to only include away goals
    data = json
    setupGame();
  });

function populateSeasonDropdown() {
  const seasonSelect = document.getElementById("seasonSelect");

  // Prevent duplicates if called again
  if (seasonSelect.children.length > 0) return;

  seasons.forEach(season => {
    const option = document.createElement("option");
    option.value = season;
    option.textContent = season;
    seasonSelect.appendChild(option);
  });
}

function setupGame() {
  // Build player list
  players = [...new Set(data.map(d => d.scorer))];
    // Build season list
    seasons = [...new Set(data.map(d => d.season))].sort();
  const seen = new Set();

  data.forEach(row => {
    const key = row.away_team + "|" + row.stadium;

    // Build valid questions
    if (!seen.has(key)) {
      seen.add(key);
      questions.push({
        team: row.away_team,
        stadium: row.stadium,
        key
      });
    }
    populateSeasonDropdown();


    // Build fast lookup index
    if (!index[key]) index[key] = new Set();
    index[key].add(JSON.stringify({
  player: row.scorer,
  season: row.season
}));
  });

 
  newQuestion();
}

function newQuestion() {
  currentQuestion = questions[Math.floor(Math.random() * questions.length)];

  document.getElementById("team").textContent = currentQuestion.team;
  document.getElementById("stadium").textContent = currentQuestion.stadium;
  document.getElementById("result").textContent = "";
  document.getElementById("playerInput").value = "";
  document.getElementById("suggestions").innerHTML = "";

    // Display number of possible answers
  const key = currentQuestion.key;
  const possiblePlayers = index[key] ? Array.from(index[key].keys()) : [];
  document.getElementById("numAnswers").textContent = possiblePlayers.length;

  // Clear previous correct answers
  document.getElementById("correctAnswers").textContent = "";

}

function submitAnswer() {
  const player = document.getElementById("playerInput").value.trim();
  const season = document.getElementById("seasonSelect").value;
  const key = currentQuestion.key;

  const entries = index[key] ? Array.from(index[key]).map(e => JSON.parse(e)) : [];


const normalizedPlayer = player.trim().toLowerCase();
const normalizedSeason = String(season).trim();

const exactMatch = entries.some(e => 
  e.player.trim().toLowerCase() === normalizedPlayer &&
  String(e.season).trim() === normalizedSeason
);

const playerMatch = entries.some(e => 
  e.player.trim().toLowerCase() === normalizedPlayer
);
  let resultText = "";

  if (exactMatch) {
    resultText = "✅ Correct!";
  } else if (playerMatch) {
    resultText = "⚠️ Correct player, wrong season!";
  } else {
    resultText = "❌ Wrong!";
  }

  document.getElementById("result").textContent = resultText;

  // Show all correct answers
  const formatted = entries.map(e => `${e.player} (${e.season})`);
  document.getElementById("correctAnswers").innerHTML = formatted.join("<br>");

  console.log("Player input:", player);
 console.log("Season input:", season);
 console.log("Season input:", exactMatch);
console.log("Entries:", entries);

}


// Autocomplete
const input = document.getElementById("playerInput");
const suggestions = document.getElementById("suggestions");

input.addEventListener("input", () => {
  const query = input.value.toLowerCase();

  const matches = players
    .filter(p => p.toLowerCase().includes(query))
    .slice(0, 10);

  suggestions.innerHTML = "";

  matches.forEach(name => {
    const li = document.createElement("li");
    li.textContent = name;
    li.onclick = () => {
      input.value = name;
      suggestions.innerHTML = "";
    };
    suggestions.appendChild(li);
  });
});
</script>

</body>
</html>
